<!DOCTYPE html>
<html>
<body>

<script>
let tests = [
  {
    name: "Math Test",
    questions: [
      {
        question: "2 + 2 = ?",
        options: ["1", "2", "3", "4"],
        answer: "4",
        explanation: "2 + 2 = 4"
      }
    ]
  },
  {
    name: "Reasoning Test",
    questions: [
      {
        question: "Find next: 2, 4, 6, ?",
        options: ["7", "8", "9", "10"],
        answer: "8",
        explanation: "Pattern +2"
      }
    ]
  }
];

let questions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let timeLeft = 30;

// ✅ Show test list
function showTests() {
  let html = "<h2>Select a Test</h2>";

  tests.forEach((test, index) => {
    html += `<button onclick="startTest(${index})">${test.name}</button><br><br>`;
  });

  document.body.innerHTML = html;
}

// ✅ Start selected test
function startTest(index) {
  questions = tests[index].questions;

  currentIndex = 0;
  score = 0;
  userAnswers = [];
  timeLeft = 30;

  document.body.innerHTML = `
    <h3>Time Left: <span id="timer">30</span> seconds</h3>
    <div id="palette"></div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="explanation"></p>
    <br>
   <button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
  `;

  loadQuestion();
  startTimer();
}

// ✅ Load question
function loadQuestion() {
  let q = questions[currentIndex];
  
  document.getElementById("question").innerText = q.question;
  document.getElementById("explanation").innerText = "";
  answered = false;

  let optionsHtml = "";
  q.options.forEach(opt => {
    let selected = userAnswers[currentIndex];

if (selected === opt) {
  optionsHtml += `<button style="background-color: lightgreen" onclick="checkAnswer('${opt}')">${opt}</button><br>`;
} else {
  optionsHtml += `<button onclick="checkAnswer('${opt}')">${opt}</button><br>`;
}
  });

  document.getElementById("options").innerHTML = optionsHtml;
}

// ✅ Check answer
function checkAnswer(selected) {
  if (answered) return;

  answered = true;

  userAnswers[currentIndex] = selected;

  let correct = questions[currentIndex].answer;

  if (selected === correct) {
    score++;
  }

  document.getElementById("explanation").innerText =
    "Explanation: " + questions[currentIndex].explanation;
}

// ✅ Next question
function nextQuestion() {
  if (!answered) {
    alert("Please select an answer first!");
    return;
  }
  function loadPalette()
  function goToQuestion(index) {
  currentIndex = index;
  loadQuestion();
    loadPalette();
}
  {
  let html = "<h3>Questions:</h3>";

  questions.forEach((q, index) => {
    let color = userAnswers[index] ? "lightgreen" : "lightgray";

    html += `<button 
      style="background-color:${color}; margin:2px;"
      onclick="goToQuestion(${index})">
      ${index + 1}
    </button>`;
  });

  document.getElementById("palette").innerHTML = html;
}

  currentIndex++;

  if (currentIndex < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}
  function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

// ✅ Show result
function showResult() {
  let resultHTML = `<h2>Your Score: ${score}</h2>`;

  questions.forEach((q, index) => {
    resultHTML += `
      <p><b>Q${index+1}: ${q.question}</b></p>
      <p>Your Answer: ${userAnswers[index]}</p>
      <p>Correct Answer: ${q.answer}</p>
      <p>Explanation: ${q.explanation}</p>
      <hr>
    `;
  });

  document.body.innerHTML = resultHTML;
}

// ✅ Timer
function startTimer() {
  let timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time's up!");
      showResult();
    }
  }, 1000);
}

// ✅ Start app
showTests();

</script>

</body>
</html>
startTimer();
</script>

</body>
</html>
