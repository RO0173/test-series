<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6fa;
}

/* TOP BAR */
#topbar {
  background: #2d3436;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  position: sticky;
  top: 0;
}

/* LAYOUT */
#container {
  display: flex;
  height: calc(100vh - 50px);
}

/* LEFT PANEL */
#palettePanel {
  width: 25%;
  background: #ecf0f1;
  padding: 10px;
  overflow-y: auto;
}

/* RIGHT PANEL */
#questionPanel {
  width: 75%;
  padding: 20px;
}

/* QUESTION CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* OPTIONS */
.option-btn {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #dfe6e9;
  cursor: pointer;
  text-align: left;
}

/* NAV BUTTONS */
.nav-btn {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #0984e3;
  color: white;
}

/* PALETTE BUTTONS */
.palette-btn {
  width: 40px;
  height: 40px;
  margin: 4px;
  border: none;
  border-radius: 5px;
}

/* COLORS */
.not-visited { background: #b2bec3; }
.answered { background: #55efc4; }
.not-answered { background: #ff7675; }
.marked { background: #ffeaa7; }

/* MOBILE VIEW */
@media (max-width: 768px) {

  #container {
    flex-direction: column;
  }

  #palettePanel {
    width: 100%;
    height: auto;
    display: flex;
    overflow-x: auto;
  }

  #questionPanel {
    width: 100%;
  }

  .palette-btn {
    flex: 0 0 auto;
  }

}

</style>
</head>

<body>

<div id="app"></div>

<script>

// ================= DATA =================
let topics = [
  {
    name: "Math",
    theory: "Math basics...",
    tests: [
      {
        name: "Math Test",
        questions: [
          {
            question: "2 + 2 = ?",
            options: ["1", "2", "3", "4"],
            answer: "4",
            explanation: "2 + 2 = 4"
          },
          {
            question: "5 × 2 = ?",
            options: ["10", "5", "2", "20"],
            answer: "10",
            explanation: "5 × 2 = 10"
          }
        ]
      }
    ]
  }
];

// ================= VARIABLES =================
let questions = [];
let currentIndex = 0;
let userAnswers = [];
let marked = [];
let visited = [];
let timeLeft = 60;
let timerInterval;

// ================= HOME =================
function showTopics() {
  let html = "<h2>Select Topic</h2>";

  topics.forEach((t, i) => {
    html += `<button class="nav-btn" onclick="openTopic(${i})">${t.name}</button><br><br>`;
  });

  document.getElementById("app").innerHTML = html;
}

// ================= TOPIC =================
function openTopic(i) {
  let t = topics[i];

  let html = `<h2>${t.name}</h2>
  <button class="nav-btn" onclick="showTheory(${i})">📖 Theory</button>
  <h3>Tests:</h3>`;

  t.tests.forEach((test, j) => {
    html += `<button class="nav-btn" onclick="startTest(${i},${j})">${test.name}</button><br><br>`;
  });

  html += `<button class="nav-btn" onclick="showTopics()">⬅ Back</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TEST =================
function startTest(ti, tj) {
  questions = topics[ti].tests[tj].questions;

  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  marked = Array(questions.length).fill(false);
  visited = Array(questions.length).fill(false);
  timeLeft = 60;

  document.getElementById("app").innerHTML = `
    <div id="topbar">
      <div>⏱ <span id="timer">60</span>s</div>
      <button class="nav-btn" onclick="submitTest()">Submit</button>
    </div>

    <div id="container">
      <div id="palettePanel"></div>

      <div id="questionPanel">
        <div class="card">
          <h3 id="question"></h3>
          <div id="options"></div>

          <button class="nav-btn" onclick="markReview()">⭐ Mark</button>
          <button class="nav-btn" onclick="prevQuestion()">⬅ Prev</button>
          <button class="nav-btn" onclick="nextQuestion()">Next ➡</button>
        </div>
      </div>
    </div>
  `;

  loadQuestion();
  startTimer();
}

// ================= LOAD QUESTION =================
function loadQuestion() {
  visited[currentIndex] = true;

  let q = questions[currentIndex];

  document.getElementById("question").innerText =
    `Q${currentIndex+1}: ${q.question}`;

  let html = "";
  q.options.forEach(opt => {
    let selected = userAnswers[currentIndex] === opt ? "#74b9ff" : "";
    html += `<button class="option-btn" style="background:${selected}"
      onclick="selectAnswer('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;
  loadPalette();
}

// ================= SELECT =================
function selectAnswer(opt) {
  userAnswers[currentIndex] = opt;
  loadQuestion();
}

// ================= NAV =================
function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    loadQuestion();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

function goToQuestion(i) {
  currentIndex = i;
  loadQuestion();
}

// ================= MARK =================
function markReview() {
  marked[currentIndex] = !marked[currentIndex];
  loadPalette();
}

// ================= PALETTE =================
function loadPalette() {
  let html = "";

  questions.forEach((q, i) => {
    let cls = "not-visited";

    if (visited[i] && !userAnswers[i]) cls = "not-answered";
    if (userAnswers[i]) cls = "answered";
    if (marked[i]) cls = "marked";

    html += `<button class="palette-btn ${cls}" onclick="goToQuestion(${i})">${i+1}</button>`;
  });

  document.getElementById("palettePanel").innerHTML = html;
}

// ================= RESULT =================
function submitTest() {
  clearInterval(timerInterval);

  let score = 0;
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  let html = `<h2>Score: ${score}/${questions.length}</h2>`;

  questions.forEach((q, i) => {
    html += `
      <div class="card">
      <p><b>${q.question}</b></p>
      <p>Your: ${userAnswers[i]}</p>
      <p>Correct: ${q.answer}</p>
      <p>${q.explanation}</p>
      </div><br>`;
  });

  html += `<button class="nav-btn" onclick="showTopics()">🏠 Home</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TIMER =================
function startTimer() {
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      submitTest();
    }
  }, 1000);
}

// ================= START =================
showTopics();

</script>

</body>
</html>
