<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f3f6;
}

#header {
  background:#1e272e;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

#app { padding:15px; }

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.btn {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#0984e3;
  color:white;
}

.btn-secondary { background:#636e72; }
.btn-danger { background:#d63031; }

.option-btn {
  display:block;
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  background:#dfe6e9;
  text-align:left;
}

#testContainer { display:flex; gap:10px; }

#palettePanel {
  width:25%;
  background:#ecf0f1;
  padding:10px;
  border-radius:10px;
}

#questionPanel { width:75%; }

.palette-btn {
  width:40px;
  height:40px;
  margin:4px;
  border:none;
  border-radius:6px;
}

.not-visited { background:#b2bec3; }
.answered { background:#55efc4; }
.not-answered { background:#ff7675; }

@media(max-width:768px){
  #testContainer { flex-direction:column; }
  #palettePanel { width:100%; display:flex; overflow-x:auto; }
  #questionPanel { width:100%; }
}
</style>
</head>

<body>

<div id="header">
  <div>📘 Test Platform</div>
</div>

<div id="app">Loading...</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "ro-test-series.firebaseapp.com",
  projectId: "ro-test-series",
  storageBucket: "ro-test-series.firebasestorage.app",
  messagingSenderId: "58879445454",
  appId: "1:58879445454:web:df7d825eab569e3e40c39f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

// ================= DATA =================
let topics = [];
let questions = [];
let currentIndex = 0;
let userAnswers = [];
let visited = [];
let timer;
let timeLeft = 60;

// ================= LOAD =================
async function loadData() {

  let qSnap = await getDocs(collection(db, "questions"));
  let tSnap = await getDocs(collection(db, "theory"));

  let map = {};

  qSnap.forEach(doc => {
    let q = doc.data();

    if (!map[q.topic]) {
      map[q.topic] = { name:q.topic, tests:{}, theory:"" };
    }

    if (!map[q.topic].tests[q.test]) {
      map[q.topic].tests[q.test] = { name:q.test, questions:[] };
    }

    map[q.topic].tests[q.test].questions.push(q);
  });

  tSnap.forEach(doc=>{
    let t = doc.data();
    if (!map[t.topic]) map[t.topic] = { name:t.topic, tests:{}, theory:"" };
    map[t.topic].theory = t.content;
  });

  topics = Object.values(map).map(t => ({
    name:t.name,
    theory:t.theory,
    tests:Object.values(t.tests)
  }));

  showTopics();
}

// ================= HOME =================
function showTopics() {
  let html = "<h2>Subjects</h2>";

  topics.forEach((t,i)=>{
    html += `
      <div class="card">
        <h3>${t.name}</h3>
        <button class="btn" onclick="openTopic(${i})">Open</button>
      </div>
    `;
  });

  html += `<button class="btn btn-secondary" onclick="openAdmin()">Admin</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TOPIC =================
window.openTopic = function(i){
  let t = topics[i];

  let html = `<h2>${t.name}</h2>

  <div class="card">
    <button class="btn" onclick="showTheory(${i})">View Theory</button>
  </div>`;

  t.tests.forEach((test,j)=>{
    html += `
      <div class="card">
        <h4>${test.name}</h4>
        <button class="btn" onclick="startTest(${i},${j})">Start Test</button>
      </div>`;
  });

  html += `<button class="btn btn-secondary" onclick="showTopics()">Back</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= THEORY =================
window.showTheory = function(i){
  let t = topics[i];

  document.getElementById("app").innerHTML = `
    <h2>${t.name} Theory</h2>
    <div class="card">${t.theory || "No theory yet"}</div>
    <button class="btn" onclick="openTopic(${i})">Back</button>
  `;
}

// ================= TEST =================
window.startTest = function(i,j){
  questions = topics[i].tests[j].questions;

  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  visited = Array(questions.length).fill(false);
  timeLeft = 60;

  document.getElementById("app").innerHTML = `
    <div>⏱ <span id="timer">60</span></div>

    <div id="testContainer">
      <div id="palettePanel"></div>

      <div id="questionPanel">
        <div class="card">
          <h3 id="question"></h3>
          <div id="options"></div>
          <button class="btn" onclick="prevQ()">Prev</button>
          <button class="btn" onclick="nextQ()">Next</button>
          <button class="btn btn-danger" onclick="submitTest()">Submit</button>
        </div>
      </div>
    </div>
  `;

  loadQuestion();
  startTimer();
}

function loadQuestion(){
  visited[currentIndex] = true;

  let q = questions[currentIndex];

  document.getElementById("question").innerText = q.question;

  let html = "";

  q.options.forEach(opt=>{
    let selected = userAnswers[currentIndex]===opt ? "#74b9ff" : "";
    html += `<button class="option-btn" style="background:${selected}" onclick="selectAns('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  loadPalette();
}

window.selectAns = function(opt){
  userAnswers[currentIndex] = opt;
  loadQuestion();
}

window.nextQ = function(){ if(currentIndex < questions.length-1){ currentIndex++; loadQuestion(); } }
window.prevQ = function(){ if(currentIndex > 0){ currentIndex--; loadQuestion(); } }

function loadPalette(){
  let html = "";

  questions.forEach((q,i)=>{
    let cls = "not-visited";
    if(visited[i] && !userAnswers[i]) cls = "not-answered";
    if(userAnswers[i]) cls = "answered";

    html += `<button class="palette-btn ${cls}" onclick="goQ(${i})">${i+1}</button>`;
  });

  document.getElementById("palettePanel").innerHTML = html;
}

window.goQ = function(i){ currentIndex = i; loadQuestion(); }

// ================= RESULT =================
window.submitTest = function(){
  clearInterval(timer);

  let score = 0;
  questions.forEach((q,i)=>{ if(userAnswers[i]===q.answer) score++; });

  let html = `<h2>Score: ${score}/${questions.length}</h2>`;

  questions.forEach((q,i)=>{
    html += `<div class="card">
      <p>${q.question}</p>
      <p>Your: ${userAnswers[i]}</p>
      <p>Correct: ${q.answer}</p>
      <p>${q.explanation}</p>
    </div>`;
  });

  html += `<button class="btn" onclick="loadData()">Home</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft<=0) submitTest();
  },1000);
}

// ================= LOGIN =================
function showLogin(){
  document.getElementById("app").innerHTML = `
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="showTopics()">Back</button>
  `;
}

window.login = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(()=> openAdmin())
    .catch(()=> alert("Invalid login"));
}

window.logout = function(){
  signOut(auth).then(()=> showTopics());
}

// ================= ADMIN =================
window.openAdmin = function(){

  if (!currentUser) {
    showLogin();
    return;
  }

  if (currentUser.email !== "hks.sn94@gmail.com") {
    alert("Access denied");
    showTopics();
    return;
  }

  document.getElementById("app").innerHTML = `
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>

    <div class="card">
      <h3>Add Question</h3>
      <input id="topic" placeholder="Topic"><br><br>
      <input id="test" placeholder="Test Name"><br><br>
      <input id="question" placeholder="Question"><br><br>
      <input id="opt1" placeholder="Option 1"><br><br>
      <input id="opt2" placeholder="Option 2"><br><br>
      <input id="opt3" placeholder="Option 3"><br><br>
      <input id="opt4" placeholder="Option 4"><br><br>
      <input id="answer" placeholder="Answer"><br><br>
      <input id="explanation" placeholder="Explanation"><br><br>
      <button class="btn" onclick="saveQuestion()">Save Question</button>
    </div>

    <div class="card">
      <h3>Add Theory</h3>
      <input id="tTopic" placeholder="Topic"><br><br>
      <textarea id="tContent" placeholder="Theory..." style="width:100%;height:100px"></textarea><br><br>
      <button class="btn" onclick="saveTheory()">Save Theory</button>
    </div>

    <button class="btn" onclick="loadData()">Back</button>
  `;
}

window.saveQuestion = async function(){
  await addDoc(collection(db,"questions"),{
    topic:topic.value,
    test:test.value,
    question:question.value,
    options:[opt1.value,opt2.value,opt3.value,opt4.value],
    answer:answer.value,
    explanation:explanation.value
  });
  alert("Saved");
  openAdmin();
}

window.saveTheory = async function(){
  await addDoc(collection(db,"theory"),{
    topic:tTopic.value,
    content:tContent.value
  });
  alert("Theory Saved");
  openAdmin();
}

// ================= START =================
loadData();

</script>

</body>
</html>
