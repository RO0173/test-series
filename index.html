<!DOCTYPE html>
<html>
<body>

<h1 id="question"></h1>
<button onclick="checkAnswer('4')">4</button>

<script>
document.getElementById("question").innerText = "2 + 2 = ?";

function checkAnswer(ans) {
  if(ans === "4") {
    alert("Correct");
  } else {
    alert("Wrong");
  }
}
</script>

</body>
</html>
