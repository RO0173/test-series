<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Platform</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa;}
#header{background:#2d3436;color:white;padding:15px;font-size:18px;}
#app{padding:15px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{padding:10px;background:#0984e3;color:white;border:none;border-radius:6px;cursor:pointer;}
input,textarea{width:100%;padding:10px;margin:5px 0;}
.option{padding:10px;margin:5px 0;background:#dfe6e9;border:none;width:100%;}
.option.selected{background:#0984e3;color:white;}
.palette button{width:40px;height:40px;margin:3px;}
</style>

</head>

<body>

<div id="header">📘 Exam System</div>
<div id="app">Loading...</div>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔴 REPLACE ONLY THIS
const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const appDiv = document.getElementById("app");

// ================= DATA =================
let questions=[], current=0, answers=[];

// ================= LOGIN CHECK =================
onAuthStateChanged(auth,(user)=>{
  if(user){
    loadHome();
  }else{
    showLogin();
  }
});

// ================= LOGIN =================
function showLogin(){
  appDiv.innerHTML=`
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
  <hr>
  <button class="btn" onclick="loadHome()">Enter as Student</button>
  `;
}

window.login=function(){
  signInWithEmailAndPassword(auth,email.value,pass.value)
  .then(()=>loadAdmin())
  .catch(e=>alert(e.message));
};

// ================= HOME =================
function loadHome(){
  appDiv.innerHTML=`
  <h2>Welcome</h2>
  <button class="btn" onclick="startTest()">Start Test</button>
  `;
}

// ================= TEST =================
window.startTest=function(){
  questions=[
    {
      question:"2+2=?",
      options:["1","2","3","4"],
      answer:"4"
    }
  ];

  answers=Array(questions.length).fill(null);
  current=0;
  renderQ();
};

function renderQ(){
  let q=questions[current];

  let html=`
  <h3>${q.question}</h3>
  `;

  q.options.forEach(opt=>{
    let sel=answers[current]==opt?"selected":"";
    html+=`<button class="option ${sel}" onclick="selectAns('${opt}')">${opt}</button>`;
  });

  html+=`
  <br>
  <button class="btn" onclick="prev()">Prev</button>
  <button class="btn" onclick="next()">Next</button>
  <button class="btn" onclick="submit()">Submit</button>
  `;

  appDiv.innerHTML=html;
}

window.selectAns=function(opt){
  answers[current]=opt;
  renderQ();
};

window.next=function(){
  if(current<questions.length-1){
    current++;
    renderQ();
  }
};

window.prev=function(){
  if(current>0){
    current--;
    renderQ();
  }
};

window.submit=function(){
  let score=0;

  questions.forEach((q,i)=>{
    if(q.answer===answers[i]) score++;
  });

  appDiv.innerHTML=`
  <h2>Score: ${score}/${questions.length}</h2>
  <button class="btn" onclick="loadHome()">Home</button>
  `;
};

// ================= ADMIN =================
function loadAdmin(){
  appDiv.innerHTML=`
  <h2>Admin Panel</h2>

  <input id="q" placeholder="Question">
  <input id="o1" placeholder="Option 1">
  <input id="o2" placeholder="Option 2">
  <input id="o3" placeholder="Option 3">
  <input id="o4" placeholder="Option 4">
  <input id="ans" placeholder="Answer">

  <button class="btn" onclick="saveQ()">Save</button>
  <button class="btn" onclick="loadHome()">Exit</button>
  `;
}

window.saveQ=async function(){
  await addDoc(collection(db,"questions"),{
    question:q.value,
    options:[o1.value,o2.value,o3.value,o4.value],
    answer:ans.value
  });

  alert("Saved!");
};

</script>

</body>
</html>
