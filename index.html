<!DOCTYPE html>
<html>
<body>
<h3>Time Left: <span id="timer">30</span> seconds</h3>
<h2 id="question"></h2>

<div id="options"></div>

<p id="explanation"></p>

<br>
<button onclick="nextQuestion()">Next</button>

<script>
let questions = [
  {
    question: "2 + 2 = ?",
    options: ["1", "2", "3", "4"],
    answer: "4",
    explanation: "2 + 2 = 4"
  },
  {
    question: "5 × 3 = ?",
    options: ["10", "15", "20", "25"],
    answer: "15",
    explanation: "5 × 3 = 15"
  }
];

let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];

function loadQuestion() {
  let q = questions[currentIndex];
  
  document.getElementById("question").innerText = q.question;
  document.getElementById("explanation").innerText = "";
  answered = false;

  let optionsHtml = "";
  q.options.forEach(opt => {
    optionsHtml += `<button onclick="checkAnswer('${opt}')">${opt}</button><br>`;
  });

  document.getElementById("options").innerHTML = optionsHtml;
}

function checkAnswer(selected) {
  if (answered) return;

  answered = true;

  userAnswers[currentIndex] = selected;

  let correct = questions[currentIndex].answer;

  if (selected === correct) {
    score++;
  }

  document.getElementById("explanation").innerText =
    "Explanation: " + questions[currentIndex].explanation;
}

function nextQuestion() {
  if (!answered) {
    alert("Please select an answer first!");
    return;
  }

  currentIndex++;

  if (currentIndex < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let resultHTML = `<h2>Your Score: ${score}</h2>`;

  questions.forEach((q, index) => {
    resultHTML += `
      <p><b>Q${index+1}: ${q.question}</b></p>
      <p>Your Answer: ${userAnswers[index]}</p>
      <p>Correct Answer: ${q.answer}</p>
      <p>Explanation: ${q.explanation}</p>
      <hr>
    `;
  });

  document.body.innerHTML = resultHTML;
}

loadQuestion();
</script>

</body>
</html>
