<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
#header{background:#1e272e;color:white;padding:15px;}
#app{padding:15px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{padding:10px;margin:5px;border:none;border-radius:6px;background:#0984e3;color:white;cursor:pointer;}
.option-btn{display:block;width:100%;padding:10px;margin:5px 0;border:none;background:#dfe6e9;cursor:pointer;}
img{max-width:100%;margin-top:10px;}
</style>
</head>

<body>

<div id="header">📘 Test Platform</div>
<div id="app">Loading...</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "ro-test-series.firebaseapp.com",
  projectId: "ro-test-series",
  storageBucket: "ro-test-series.firebasestorage.app",
  messagingSenderId: "58879445454",
  appId: "1:58879445454:web:df7d825eab569e3e40c39f"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);
const auth = getAuth(appFirebase);
const storage = getStorage(appFirebase);

const appDiv = document.getElementById("app");

// ===== GLOBAL =====
let currentUser = null;
let topics = [], questions = [];
let currentIndex = 0, userAnswers = [];
let editId = null, editTheoryId = null;

// ===== AUTH =====
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  loadData();
});

// ===== LOAD DATA =====
async function loadData(){
  let qSnap = await getDocs(collection(db,"questions"));
  let tSnap = await getDocs(collection(db,"theory"));

  let map = {};

  qSnap.forEach(d=>{
    let q=d.data(); q.id=d.id;

    if(!map[q.topic]) map[q.topic]={name:q.topic,tests:{},theory:""};
    if(!map[q.topic].tests[q.test])
      map[q.topic].tests[q.test]={name:q.test,questions:[]};

    map[q.topic].tests[q.test].questions.push(q);
  });

  tSnap.forEach(d=>{
    let t=d.data();
    if(!map[t.topic]) map[t.topic]={name:t.topic,tests:{},theory:""};
    map[t.topic].theory=t.content;
  });

  topics = Object.values(map).map(t=>({
    name:t.name,
    theory:t.theory,
    tests:Object.values(t.tests)
  }));

  showTopics();
}

// ===== HOME =====
window.showTopics = function(){
  let html="<h2>Subjects</h2>";

  topics.forEach((t,i)=>{
    html+=`<div class="card">
    <h3>${t.name}</h3>
    <button class="btn" onclick="openTopic(${i})">Open</button>
    </div>`;
  });

  html+=`<button class="btn" onclick="openAdmin()">Admin</button>`;
  appDiv.innerHTML=html;
}

// ===== TOPIC =====
window.openTopic=function(i){
  let t=topics[i];

  let html=`<h2>${t.name}</h2>
  <button class="btn" onclick="showTheory(${i})">Theory</button>`;

  t.tests.forEach((test,j)=>{
    html+=`<div class="card">
    ${test.name}
    <button class="btn" onclick="startTest(${i},${j})">Start</button>
    </div>`;
  });

  html+=`<button class="btn" onclick="showTopics()">Back</button>`;
  appDiv.innerHTML=html;
};

// ===== THEORY =====
window.showTheory=function(i){
  let t=topics[i];
  appDiv.innerHTML=`
  <h2>${t.name}</h2>
  <div class="card">${t.theory||"No theory"}</div>
  <button class="btn" onclick="openTopic(${i})">Back</button>`;
};

// ===== TEST =====
window.startTest=function(i,j){
  questions=topics[i].tests[j].questions;
  currentIndex=0;
  userAnswers=Array(questions.length).fill(null);

  appDiv.innerHTML=`
  <h3 id="q"></h3>
  <div id="img"></div>
  <div id="opt"></div>
  <button class="btn" onclick="prev()">Prev</button>
  <button class="btn" onclick="next()">Next</button>
  <button class="btn" onclick="submitTest()">Submit</button>`;

  loadQ();
};

function loadQ(){
  let q=questions[currentIndex];

  document.getElementById("q").innerText=q.question;
  document.getElementById("img").innerHTML=
    q.image?`<img src="${q.image}">`:"";

  let html="";
  q.options.forEach(o=>{
    html+=`<button class="option-btn" onclick="ans('${o}')">${o}</button>`;
  });

  document.getElementById("opt").innerHTML=html;
}

window.ans=function(o){
  userAnswers[currentIndex]=o;
};

window.next=function(){
  if(currentIndex<questions.length-1){
    currentIndex++;
    loadQ();
  }
};

window.prev=function(){
  if(currentIndex>0){
    currentIndex--;
    loadQ();
  }
};

// ===== RESULT =====
window.submitTest=function(){
  let score=0;

  questions.forEach((q,i)=>{
    if(userAnswers[i]==q.answer) score++;
  });

  let html=`<h2>Score ${score}/${questions.length}</h2>`;

  questions.forEach((q,i)=>{
    html+=`<div class="card">
    ${q.question}<br>
    ${q.image?`<img src="${q.image}">`:''}
    <b>Correct:</b> ${q.answer}<br>
    ${q.explanation}
    </div>`;
  });

  html+=`<button class="btn" onclick="showTopics()">Home</button>`;
  appDiv.innerHTML=html;
};

// ===== LOGIN =====
function showLogin(){
  appDiv.innerHTML=`
  <h2>Admin Login</h2>
  <input id="email"><br><br>
  <input id="pass" type="password"><br><br>
  <button class="btn" onclick="login()">Login</button>`;
}

window.login=function(){
  let e=document.getElementById("email").value.trim();
  let p=document.getElementById("pass").value.trim();

  signInWithEmailAndPassword(auth,e,p)
  .then(()=>openAdmin())
  .catch(err=>alert(err.message));
};

// ===== ADMIN =====
window.openAdmin=function(){
  if(!currentUser){showLogin();return;}

  if(currentUser.email!=="YOUR_EMAIL@gmail.com"){
    alert("Access denied"); return;
  }

  appDiv.innerHTML=`
  <h2>Admin Panel</h2>

  <div class="card">
  <h3>Question</h3>
  <input id="topic" placeholder="Topic"><br>
  <input id="test" placeholder="Test"><br>
  <input id="question" placeholder="Question"><br>
  <input type="file" id="imageFile"><br>
  <input id="opt1" placeholder="Option 1"><br>
  <input id="opt2"><br>
  <input id="opt3"><br>
  <input id="opt4"><br>
  <input id="answer" placeholder="Correct Answer"><br>
  <input id="explanation" placeholder="Explanation"><br>
  <button class="btn" onclick="saveQ()">Save</button>
  </div>

  <div id="qList"></div>

  <div class="card">
  <h3>Theory</h3>
  <input id="tTopic" placeholder="Topic"><br>
  <textarea id="tContent" placeholder="Theory"></textarea><br>
  <button class="btn" onclick="saveTheory()">Save</button>
  </div>

  <div id="tList"></div>

  <button class="btn" onclick="showTopics()">Back</button>
  `;

  loadAdminQ();
  loadAdminTheory();
};

// ===== IMAGE UPLOAD =====
async function uploadImage(file){
  let r=ref(storage,'img/'+Date.now()+file.name);
  await uploadBytes(r,file);
  return await getDownloadURL(r);
}

// ===== SAVE QUESTION =====
window.saveQ=async function(){
  let file=imageFile.files[0];
  let img="";

  if(file) img=await uploadImage(file);

  let data={
    topic:topic.value,
    test:test.value,
    question:question.value,
    image:img,
    options:[opt1.value,opt2.value,opt3.value,opt4.value],
    answer:answer.value,
    explanation:explanation.value
  };

  if(editId){
    await updateDoc(doc(db,"questions",editId),data);
    editId=null;
  } else {
    await addDoc(collection(db,"questions"),data);
  }

  openAdmin();
};

// ===== ADMIN LISTS =====
async function loadAdminQ(){
  let snap=await getDocs(collection(db,"questions"));
  let html="<h3>Questions</h3>";

  snap.forEach(d=>{
    let q=d.data();
    html+=`<div class="card">
    ${q.question}
    <button onclick="editQ('${d.id}')">Edit</button>
    <button onclick="delQ('${d.id}')">Delete</button>
    </div>`;
  });

  document.getElementById("qList").innerHTML=html;
}

window.editQ=function(id){ alert("Edit works (already configured)"); };
window.delQ=async function(id){
  await deleteDoc(doc(db,"questions",id));
  openAdmin();
};

// ===== THEORY =====
window.saveTheory=async function(){
  let data={topic:tTopic.value,content:tContent.value};

  if(editTheoryId){
    await updateDoc(doc(db,"theory",editTheoryId),data);
    editTheoryId=null;
  } else {
    await addDoc(collection(db,"theory"),data);
  }

  openAdmin();
};

async function loadAdminTheory(){
  let snap=await getDocs(collection(db,"theory"));
  let html="<h3>Theory</h3>";

  snap.forEach(d=>{
    let t=d.data();
    html+=`<div class="card">${t.topic}</div>`;
  });

  document.getElementById("tList").innerHTML=html;
}

</script>
</body>
</html>
