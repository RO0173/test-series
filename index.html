<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; background:#f5f6fa; }

#topbar {
  background:#2d3436; color:white;
  padding:10px; display:flex; justify-content:space-between;
}

#container { display:flex; height:90vh; }

#palettePanel {
  width:25%; background:#ecf0f1; padding:10px; overflow-y:auto;
}

#questionPanel { width:75%; padding:20px; }

.card {
  background:white; padding:20px; border-radius:10px;
}

.option-btn {
  display:block; width:100%;
  padding:10px; margin:8px 0;
  border:none; border-radius:6px;
  background:#dfe6e9;
}

.nav-btn {
  padding:10px; margin:5px;
  border:none; border-radius:6px;
  background:#0984e3; color:white;
}

.palette-btn {
  width:40px; height:40px;
  margin:4px; border:none;
}

.not-visited { background:#b2bec3; }
.answered { background:#55efc4; }
.not-answered { background:#ff7675; }

@media(max-width:768px){
  #container { flex-direction:column; }
  #palettePanel { width:100%; display:flex; overflow-x:auto; }
  #questionPanel { width:100%; }
}
</style>
</head>

<body>

<div id="app">Loading...</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔑 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "ro-test-series.firebaseapp.com",
  projectId: "ro-test-series",
  storageBucket: "ro-test-series.firebasestorage.app",
  messagingSenderId: "58879445454",
  appId: "1:58879445454:web:df7d825eab569e3e40c39f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

// ================= GLOBAL =================
let topics = [];
let questions = [];
let currentIndex = 0;
let userAnswers = [];
let visited = [];
let timer;
let timeLeft = 60;

// ================= LOAD DATA =================
async function loadData() {
  let snap = await getDocs(collection(db, "questions"));

  let map = {};

  snap.forEach(doc => {
    let q = doc.data();

    if (!map[q.topic]) {
      map[q.topic] = { name: q.topic, tests:{} };
    }

    if (!map[q.topic].tests[q.test]) {
      map[q.topic].tests[q.test] = {
        name: q.test,
        questions:[]
      };
    }

    map[q.topic].tests[q.test].questions.push(q);
  });

  topics = Object.values(map).map(t => ({
    name: t.name,
    tests: Object.values(t.tests)
  }));

  showTopics();
}

// ================= HOME =================
function showTopics() {
  let html = "<h2>Select Topic</h2>";

  topics.forEach((t,i)=>{
    html += `<button class="nav-btn" onclick="openTopic(${i})">${t.name}</button><br><br>`;
  });

  html += `<button class="nav-btn" onclick="openAdmin()">Admin Panel</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TOPIC =================
window.openTopic = function(i){
  let t = topics[i];

  let html = `<h2>${t.name}</h2><h3>Tests:</h3>`;

  t.tests.forEach((test,j)=>{
    html += `<button class="nav-btn" onclick="startTest(${i},${j})">${test.name}</button><br><br>`;
  });

  html += `<button onclick="showTopics()">Back</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TEST =================
window.startTest = function(i,j){
  questions = topics[i].tests[j].questions;

  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  visited = Array(questions.length).fill(false);
  timeLeft = 60;

  document.getElementById("app").innerHTML = `
  <div id="topbar">
    <div>⏱ <span id="timer">60</span>s</div>
    <button onclick="submitTest()">Submit</button>
  </div>

  <div id="container">
    <div id="palettePanel"></div>

    <div id="questionPanel">
      <div class="card">
        <h3 id="question"></h3>
        <div id="options"></div>

        <button onclick="prevQ()">Prev</button>
        <button onclick="nextQ()">Next</button>
      </div>
    </div>
  </div>
  `;

  loadQuestion();
  startTimer();
}

// ================= QUESTION =================
function loadQuestion(){
  visited[currentIndex] = true;

  let q = questions[currentIndex];

  document.getElementById("question").innerText =
    `Q${currentIndex+1}: ${q.question}`;

  let html = "";

  q.options.forEach(opt=>{
    let selected = userAnswers[currentIndex]===opt ? "#74b9ff" : "";

    html += `<button class="option-btn" style="background:${selected}"
      onclick="selectAns('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  loadPalette();
}

// ================= SELECT =================
window.selectAns = function(opt){
  userAnswers[currentIndex] = opt;
  loadQuestion();
}

// ================= NAV =================
window.nextQ = function(){
  if(currentIndex < questions.length-1){
    currentIndex++;
    loadQuestion();
  }
}

window.prevQ = function(){
  if(currentIndex > 0){
    currentIndex--;
    loadQuestion();
  }
}

// ================= PALETTE =================
function loadPalette(){
  let html = "";

  questions.forEach((q,i)=>{
    let cls = "not-visited";

    if(visited[i] && !userAnswers[i]) cls = "not-answered";
    if(userAnswers[i]) cls = "answered";

    html += `<button class="palette-btn ${cls}" onclick="goQ(${i})">${i+1}</button>`;
  });

  document.getElementById("palettePanel").innerHTML = html;
}

window.goQ = function(i){
  currentIndex = i;
  loadQuestion();
}

// ================= RESULT =================
window.submitTest = function(){
  clearInterval(timer);

  let score = 0;

  questions.forEach((q,i)=>{
    if(userAnswers[i] === q.answer) score++;
  });

  let html = `<h2>Score: ${score}/${questions.length}</h2>`;

  questions.forEach((q,i)=>{
    html += `
      <div class="card">
      <p>${q.question}</p>
      <p>Your: ${userAnswers[i]}</p>
      <p>Correct: ${q.answer}</p>
      <p>${q.explanation}</p>
      </div><br>`;
  });

  html += `<button onclick="loadData()">Home</button>`;

  document.getElementById("app").innerHTML = html;
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if(timeLeft <= 0){
      submitTest();
    }
  },1000);
}

// ================= LOGIN =================
function showLogin() {
  document.getElementById("app").innerHTML = `
    <h2>Admin Login</h2>

    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>
    <button onclick="showTopics()">Back</button>
  `;
}

window.login = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Login success");
      openAdmin();
    })
    .catch(() => {
      alert("Invalid login");
    });
}

window.logout = function(){
  signOut(auth).then(()=>{
    alert("Logged out");
    showTopics();
  });
}

// ================= ADMIN =================
window.openAdmin = function(){

  if (!currentUser) {
    showLogin();
    return;
  }

  document.getElementById("app").innerHTML = `
    <h2>Admin Dashboard</h2>

    <button onclick="logout()">Logout</button>

    <div class="card">
      <input id="topic" placeholder="Topic"><br><br>
      <input id="test" placeholder="Test Name"><br><br>
      <input id="question" placeholder="Question"><br><br>

      <input id="opt1" placeholder="Option 1"><br><br>
      <input id="opt2" placeholder="Option 2"><br><br>
      <input id="opt3" placeholder="Option 3"><br><br>
      <input id="opt4" placeholder="Option 4"><br><br>

      <input id="answer" placeholder="Correct Answer"><br><br>
      <input id="explanation" placeholder="Explanation"><br><br>

      <button onclick="saveQuestion()">Save</button>
      <button onclick="loadData()">Back</button>
    </div>
  `;
}

window.saveQuestion = async function(){
  let topic = document.getElementById("topic").value;
  let test = document.getElementById("test").value;
  let question = document.getElementById("question").value;

  let options = [
    document.getElementById("opt1").value,
    document.getElementById("opt2").value,
    document.getElementById("opt3").value,
    document.getElementById("opt4").value
  ];

  let answer = document.getElementById("answer").value;
  let explanation = document.getElementById("explanation").value;

  await addDoc(collection(db,"questions"),{
    topic,test,question,options,answer,explanation
  });

  alert("Saved!");
  openAdmin();
}

// ================= START =================
loadData();

</script>

</body>
</html>
