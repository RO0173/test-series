<!DOCTYPE html>
<html>
<body>

<script>

// ✅ DATA STRUCTURE (TOPICS + THEORY + TESTS)
let topics = [
  {
    name: "Math",
    theory: "Math is the study of numbers. Example: Addition, Multiplication.",
    tests: [
      {
        name: "Basic Math Test",
        questions: [
          {
            question: "2 + 2 = ?",
            options: ["1", "2", "3", "4"],
            answer: "4",
            explanation: "2 + 2 = 4"
          }
        ]
      }
    ]
  },
  {
    name: "Reasoning",
    theory: "Reasoning improves logical thinking ability.",
    tests: [
      {
        name: "Basic Reasoning Test",
        questions: [
          {
            question: "Find next: 2, 4, 6, ?",
            options: ["7", "8", "9", "10"],
            answer: "8",
            explanation: "Pattern +2"
          }
        ]
      }
    ]
  }
];

// ================= QUIZ VARIABLES =================
let questions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let timeLeft = 30;
let timerInterval;

// ================= UI FUNCTIONS =================

// ✅ Show Topics
function showTopics() {
  let html = "<h2>Select Topic</h2>";

  topics.forEach((topic, index) => {
    html += `<button onclick="openTopic(${index})">${topic.name}</button><br><br>`;
  });

  document.body.innerHTML = html;
}

// ✅ Open Topic
function openTopic(index) {
  let topic = topics[index];

  let html = `
    <h2>${topic.name}</h2>
    <button onclick="showTheory(${index})">View Theory</button>
    <h3>Tests:</h3>
  `;

  topic.tests.forEach((test, i) => {
    html += `<button onclick="startTest(${index}, ${i})">${test.name}</button><br><br>`;
  });

  html += `<br><button onclick="showTopics()">Back</button>`;

  document.body.innerHTML = html;
}

// ✅ Show Theory
function showTheory(index) {
  let topic = topics[index];

  document.body.innerHTML = `
    <h2>${topic.name} Theory</h2>
    <p>${topic.theory}</p>
    <button onclick="openTopic(${index})">Back</button>
  `;
}

// ================= QUIZ LOGIC =================

// ✅ Start Test
function startTest(topicIndex, testIndex) {
  questions = topics[topicIndex].tests[testIndex].questions;

  currentIndex = 0;
  score = 0;
  userAnswers = [];
  timeLeft = 30;

  document.body.innerHTML = `
    <h3>Time Left: <span id="timer">30</span> seconds</h3>
    <div id="palette"></div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="explanation"></p>
    <br>
    <button onclick="prevQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
  `;

  loadQuestion();
  startTimer();
}

// ✅ Load Question
function loadQuestion() {
  let q = questions[currentIndex];

  document.getElementById("question").innerText = q.question;
  document.getElementById("explanation").innerText = "";
  answered = false;

  let optionsHtml = "";
  let selected = userAnswers[currentIndex];

  q.options.forEach(opt => {
    let color = (selected === opt) ? "lightgreen" : "";
    optionsHtml += `<button style="background:${color}" onclick="checkAnswer('${opt}')">${opt}</button><br>`;
  });

  document.getElementById("options").innerHTML = optionsHtml;

  loadPalette();
}

// ✅ Check Answer (FIXED SCORING BUG)
function checkAnswer(selected) {
  if (answered) return;

  answered = true;

  let correct = questions[currentIndex].answer;

  // Prevent double scoring
  if (!userAnswers[currentIndex]) {
    if (selected === correct) {
      score++;
    }
  }

  userAnswers[currentIndex] = selected;

  let buttons = document.querySelectorAll("#options button");

  buttons.forEach(btn => {
    if (btn.innerText === selected) {
      btn.style.backgroundColor = "lightgreen";
    }
    if (btn.innerText === correct) {
      btn.style.backgroundColor = "lightblue";
    }
  });

  document.getElementById("explanation").innerText =
    "Explanation: " + questions[currentIndex].explanation;

  loadPalette();
}

// ✅ Next Question
function nextQuestion() {
  if (!userAnswers[currentIndex]) {
    alert("Please select an answer first!");
    return;
  }

  currentIndex++;

  if (currentIndex < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

// ✅ Previous Question
function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

// ✅ Palette
function loadPalette() {
  let html = "<h3>Questions:</h3>";

  questions.forEach((q, index) => {
    let color = userAnswers[index] ? "lightgreen" : "lightgray";

    html += `<button 
      style="background:${color}; margin:2px;"
      onclick="goToQuestion(${index})">
      ${index + 1}
    </button>`;
  });

  document.getElementById("palette").innerHTML = html;
}

// ✅ Jump
function goToQuestion(index) {
  currentIndex = index;
  loadQuestion();
}

// ✅ Result
function showResult() {
  clearInterval(timerInterval);

  let resultHTML = `<h2>Your Score: ${score}</h2>`;

  questions.forEach((q, index) => {
    resultHTML += `
      <p><b>Q${index+1}: ${q.question}</b></p>
      <p>Your Answer: ${userAnswers[index]}</p>
      <p>Correct Answer: ${q.answer}</p>
      <p>Explanation: ${q.explanation}</p>
      <hr>
    `;
  });

  resultHTML += `<button onclick="showTopics()">Go Home</button>`;

  document.body.innerHTML = resultHTML;
}

// ✅ Timer (FIXED MULTIPLE TIMER BUG)
function startTimer() {
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time's up!");
      showResult();
    }
  }, 1000);
}

// ✅ Start App
showTopics();

</script>

</body>
</html>
