<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
#header{background:#1e272e;color:white;padding:15px;}
#app{padding:15px;}

.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{padding:10px;margin:5px;border:none;border-radius:6px;background:#0984e3;color:white;}
.btn-danger{background:#d63031;}
.option-btn{display:block;width:100%;padding:10px;margin:5px 0;border:none;background:#dfe6e9;}

#testContainer{display:flex;}
#palette{width:25%;padding:10px;}
#questionBox{width:75%;padding:10px;}

.palette-btn{width:40px;height:40px;margin:3px;}
.answered{background:#55efc4;}
.not-answered{background:#ff7675;}
.not-visited{background:#b2bec3;}

img{max-width:100%;margin:10px 0;}
</style>
</head>

<body>

<div id="header">📘 Test Platform</div>
<div id="app">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, getDocs, addDoc,
  deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { 
  getAuth, signInWithEmailAndPassword,
  onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔑 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "ro-test-series.firebaseapp.com",
  projectId: "ro-test-series",
  storageBucket: "ro-test-series.firebasestorage.app",
  messagingSenderId: "58879445454",
  appId: "1:58879445454:web:df7d825eab569e3e40c39f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;
onAuthStateChanged(auth,u=>currentUser=u);

// ===== DATA =====
let topics=[],questions=[],currentIndex=0,userAnswers=[],visited=[];
let editId=null;

// ===== LOAD DATA =====
async function loadData(){
 let qSnap=await getDocs(collection(db,"questions"));
 let tSnap=await getDocs(collection(db,"theory"));

 let map={};

 qSnap.forEach(d=>{
  let q=d.data();
  q.id=d.id;

  if(!map[q.topic]) map[q.topic]={name:q.topic,tests:{},theory:""};

  if(!map[q.topic].tests[q.test]){
    map[q.topic].tests[q.test]={name:q.test,questions:[]};
  }

  map[q.topic].tests[q.test].questions.push(q);
 });

 tSnap.forEach(d=>{
  let t=d.data();
  if(!map[t.topic]) map[t.topic]={name:t.topic,tests:{},theory:""};
  map[t.topic].theory=t.content;
 });

 topics=Object.values(map).map(t=>({
  name:t.name,
  theory:t.theory,
  tests:Object.values(t.tests)
 }));

 showTopics();
}

// ===== HOME =====
function showTopics(){
 let html="<h2>Subjects</h2>";

 topics.forEach((t,i)=>{
  html+=`<div class="card">
  <h3>${t.name}</h3>
  <button class="btn" onclick="openTopic(${i})">Open</button>
  </div>`;
 });

 html+=`<button class="btn" onclick="openAdmin()">Admin</button>`;
 document.getElementById("app").innerHTML=html;
}

// ===== TOPIC =====
window.openTopic=function(i){
 let t=topics[i];

 let html=`<h2>${t.name}</h2>
 <button class="btn" onclick="showTheory(${i})">Theory</button>`;

 t.tests.forEach((test,j)=>{
  html+=`<div class="card">
  ${test.name}
  <button class="btn" onclick="startTest(${i},${j})">Start</button>
  </div>`;
 });

 html+=`<button class="btn" onclick="showTopics()">Back</button>`;
 document.getElementById("app").innerHTML=html;
};

// ===== THEORY =====
window.showTheory=function(i){
 let t=topics[i];
 document.getElementById("app").innerHTML=`
 <h2>${t.name}</h2>
 <div class="card">${t.theory||"No theory"}</div>
 <button class="btn" onclick="openTopic(${i})">Back</button>`;
};

// ===== TEST =====
window.startTest=function(i,j){
 questions=topics[i].tests[j].questions;
 currentIndex=0;
 userAnswers=Array(questions.length).fill(null);
 visited=Array(questions.length).fill(false);

 document.getElementById("app").innerHTML=`
 <div id="testContainer">
  <div id="palette"></div>
  <div id="questionBox">
    <h3 id="q"></h3>
    <div id="img"></div>
    <div id="opt"></div>
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
    <button onclick="submit()">Submit</button>
  </div>
 </div>`;

 loadQ();
};

function loadQ(){
 visited[currentIndex]=true;
 let q=questions[currentIndex];

 document.getElementById("q").innerText=q.question;

 // image
 document.getElementById("img").innerHTML=
   q.image ? `<img src="${q.image}">` : "";

 let html="";
 q.options.forEach(o=>{
  let sel=userAnswers[currentIndex]==o?"#74b9ff":"";
  html+=`<button class="option-btn" style="background:${sel}"
  onclick="ans('${o}')">${o}</button>`;
 });
 document.getElementById("opt").innerHTML=html;

 loadPalette();
}

window.ans=o=>{userAnswers[currentIndex]=o;loadQ();}
window.next=()=>{if(currentIndex<questions.length-1){currentIndex++;loadQ();}}
window.prev=()=>{if(currentIndex>0){currentIndex--;loadQ();}}

function loadPalette(){
 let html="";
 questions.forEach((q,i)=>{
  let c="not-visited";
  if(visited[i]&&!userAnswers[i]) c="not-answered";
  if(userAnswers[i]) c="answered";

  html+=`<button class="palette-btn ${c}" onclick="go(${i})">${i+1}</button>`;
 });
 document.getElementById("palette").innerHTML=html;
}
window.go=i=>{currentIndex=i;loadQ();}

// ===== RESULT =====
window.submit=function(){
 let score=0;
 questions.forEach((q,i)=>{if(userAnswers[i]==q.answer)score++;});

 let html=`<h2>Score ${score}/${questions.length}</h2>`;
 questions.forEach((q,i)=>{
  html+=`<div class="card">
  ${q.question}<br>
  ${q.image?`<img src="${q.image}">`:''}
  Your: ${userAnswers[i]}<br>
  Correct: ${q.answer}<br>
  ${q.explanation}
  </div>`;
 });

 html+=`<button onclick="loadData()">Home</button>`;
 document.getElementById("app").innerHTML=html;
};

// ===== LOGIN =====
function showLogin(){
 document.getElementById("app").innerHTML=`
 <h2>Login</h2>
 <input id="email"><br><br>
 <input id="pass" type="password"><br><br>
 <button onclick="login()">Login</button>`;
}

window.login=function(){
 signInWithEmailAndPassword(auth,email.value,pass.value)
 .then(()=>openAdmin())
 .catch(()=>alert("error"));
};

window.logout=()=>{signOut(auth);showTopics();};

// ===== ADMIN =====
window.openAdmin=function(){
 if(!currentUser){showLogin();return;}

 if(currentUser.email!=="YOUR_EMAIL@gmail.com"){
  alert("Access denied");return;
 }

 document.getElementById("app").innerHTML=`
 <h2>Admin</h2>

 <div class="card">
 <h3>Add/Edit Question</h3>
 <input id="topic" placeholder="Topic"><br><br>
 <input id="test" placeholder="Test"><br><br>
 <input id="question" placeholder="Question"><br><br>
 <input id="image" placeholder="Image URL"><br><br>

 <input id="opt1" placeholder="Opt1"><br><br>
 <input id="opt2" placeholder="Opt2"><br><br>
 <input id="opt3" placeholder="Opt3"><br><br>
 <input id="opt4" placeholder="Opt4"><br><br>

 <input id="answer" placeholder="Answer"><br><br>
 <input id="explanation" placeholder="Explanation"><br><br>

 <button onclick="saveQ()">Save</button>
 </div>

 <div id="list"></div>

 <button onclick="loadData()">Back</button>
 `;

 loadAdmin();
};

// ===== SAVE =====
window.saveQ=async function(){
 let data={
  topic:topic.value,
  test:test.value,
  question:question.value,
  image:image.value,
  options:[opt1.value,opt2.value,opt3.value,opt4.value],
  answer:answer.value,
  explanation:explanation.value
 };

 if(editId){
  await updateDoc(doc(db,"questions",editId),data);
  editId=null;
 } else {
  await addDoc(collection(db,"questions"),data);
 }

 alert("Saved");
 openAdmin();
};

// ===== LOAD ADMIN LIST =====
async function loadAdmin(){
 let snap=await getDocs(collection(db,"questions"));

 let html="<h3>All Questions</h3>";

 snap.forEach(d=>{
  let q=d.data();

  html+=`<div class="card">
  ${q.question}
  <button onclick="edit('${d.id}')">Edit</button>
  <button onclick="del('${d.id}')">Delete</button>
  </div>`;
 });

 document.getElementById("list").innerHTML=html;
}

// ===== DELETE =====
window.del=async function(id){
 await deleteDoc(doc(db,"questions",id));
 alert("Deleted");
 openAdmin();
};

// ===== EDIT =====
window.edit=async function(id){
 let snap=await getDocs(collection(db,"questions"));

 snap.forEach(d=>{
  if(d.id==id){
    let q=d.data();
    topic.value=q.topic;
    test.value=q.test;
    question.value=q.question;
    image.value=q.image||"";

    opt1.value=q.options[0];
    opt2.value=q.options[1];
    opt3.value=q.options[2];
    opt4.value=q.options[3];

    answer.value=q.answer;
    explanation.value=q.explanation;

    editId=id;
  }
 });
};

// START
loadData();

</script>
</body>
</html>
