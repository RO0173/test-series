<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
#header{background:#1e272e;color:white;padding:15px;}
#app{padding:15px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{padding:10px;margin:5px;border:none;border-radius:6px;background:#0984e3;color:white;cursor:pointer;}
.option-btn{display:block;width:100%;padding:10px;margin:5px 0;border:none;background:#dfe6e9;cursor:pointer;}
.palette-btn{width:40px;height:40px;margin:3px;border:none;}
img{max-width:100%;margin-top:10px;}
</style>
</head>

<body>

<div id="header">📘 Test Platform</div>
<div id="app">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc,
deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
authDomain: "ro-test-series.firebaseapp.com",
projectId: "ro-test-series",
storageBucket: "YOUR_PROJECT.appspot.com"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const auth = getAuth(appF);
const storage = getStorage(appF);

const appDiv = document.getElementById("app");

// ================= GLOBAL =================
let currentUser=null;
let topics=[],questions=[];
let currentIndex=0,userAnswers=[];
let visited=[],marked=[];
let timeLeft=300,timerInterval;

let editQid=null;
let editTid=null;

// ================= AUTH =================
onAuthStateChanged(auth,(user)=>{
currentUser=user;
loadData();
});

// ================= LOAD =================
async function loadData(){

let qSnap=await getDocs(collection(db,"questions"));
let tSnap=await getDocs(collection(db,"theory"));

let map={};

qSnap.forEach(d=>{
let q=d.data();
if(!map[q.topic]) map[q.topic]={name:q.topic,tests:{},theory:""};
if(!map[q.topic].tests[q.test])
map[q.topic].tests[q.test]={name:q.test,questions:[]};
map[q.topic].tests[q.test].questions.push({...q,id:d.id});
});

tSnap.forEach(d=>{
let t=d.data();
if(!map[t.topic]) map[topic]={name:t.topic,tests:{},theory:""};
map[t.topic].theory=t.content;
});

topics=Object.values(map).map(t=>({
name:t.name,
theory:t.theory,
tests:Object.values(t.tests)
}));

showTopics();
}

// ================= HOME =================
window.showTopics=function(){
let html="<h2>Subjects</h2>";

topics.forEach((t,i)=>{
html+=`
<div class="card">
<h3>${t.name}</h3>
<button class="btn" onclick="openTopic(${i})">Open</button>
</div>`;
});

html+=`<button class="btn" onclick="openAdmin()">Admin</button>`;
appDiv.innerHTML=html;
};

// ================= TOPIC =================
window.openTopic=function(i){
let t=topics[i];

let html=`<h2>${t.name}</h2>
<button class="btn" onclick="showTheory(${i})">Theory</button>`;

t.tests.forEach((test,j)=>{
html+=`
<div class="card">
${test.name}
<button class="btn" onclick="startTest(${i},${j})">Start</button>
</div>`;
});

html+=`<button class="btn" onclick="loadData()">Back</button>`;
appDiv.innerHTML=html;
};

// ================= THEORY =================
window.showTheory=function(i){
let t=topics[i];

appDiv.innerHTML=`
<h2>${t.name}</h2>
<div class="card">${t.theory||"No theory"}</div>
<button class="btn" onclick="loadData()">Back</button>`;
};

// ================= TEST =================
window.startTest=function(i,j){

questions=topics[i].tests[j].questions;

currentIndex=0;
userAnswers=Array(questions.length).fill(null);
visited=Array(questions.length).fill(false);
marked=Array(questions.length).fill(false);
timeLeft=300;

appDiv.innerHTML=`
<h3>Time: <span id="timer">300</span></h3>

<div style="display:flex">
<div id="palette" style="width:30%"></div>

<div style="width:70%">
<h3 id="q"></h3>
<div id="img"></div>
<div id="opt"></div>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submit()">Submit</button>
</div>
</div>`;

loadQ();
startTimer();
};

// ================= QUESTION =================
function loadQ(){

let q=questions[currentIndex];
visited[currentIndex]=true;

document.getElementById("q").innerText=q.question;
document.getElementById("img").innerHTML=q.image?`<img src="${q.image}">`:"";

let html="";
q.options.forEach(opt=>{
let sel=userAnswers[currentIndex]===opt?"background:#0984e3;color:white":"";
html+=`<button class="option-btn" style="${sel}" onclick="ans('${opt}')">${opt}</button>`;
});

document.getElementById("opt").innerHTML=html;
loadPalette();
}

window.ans=function(opt){
userAnswers[currentIndex]=opt;
loadQ();
};

window.next=function(){if(currentIndex<questions.length-1){currentIndex++;loadQ();}};
window.prev=function(){if(currentIndex>0){currentIndex--;loadQ();}};

// ================= PALETTE =================
function loadPalette(){
let html="";
questions.forEach((q,i)=>{
let color="#b2bec3";
if(userAnswers[i]) color="#55efc4";
if(marked[i]) color="#ffeaa7";
html+=`<button class="palette-btn" style="background:${color}" onclick="go(${i})">${i+1}</button>`;
});
document.getElementById("palette").innerHTML=html;
}

window.go=function(i){currentIndex=i;loadQ();};

// ================= TIMER =================
function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;
if(timeLeft<=0){clearInterval(timerInterval);submit();}
},1000);
}

// ================= RESULT =================
window.submit=function(){
clearInterval(timerInterval);

let score=0;
questions.forEach((q,i)=>{
if(q.answer===userAnswers[i]) score++;
});

appDiv.innerHTML=`
<h2>Score: ${score}/${questions.length}</h2>
<button class="btn" onclick="loadData()">Home</button>`;
};

// ================= ADMIN =================
window.openAdmin=function(){

if(!currentUser){
appDiv.innerHTML=`<h2>Login Required</h2>`;
return;
}

appDiv.innerHTML=`
<h2>Admin Panel</h2>

<h3>Add Question</h3>
<input id="topic" placeholder="Topic"><br>
<input id="test" placeholder="Test"><br>
<input id="question" placeholder="Question"><br>

<input id="o1"><br>
<input id="o2"><br>
<input id="o3"><br>
<input id="o4"><br>

<input id="answer"><br>
<input id="explanation"><br>

<button onclick="saveQ()">Save</button>

<hr>

<h3>Add Theory</h3>
<input id="tTopic"><br>
<textarea id="tContent"></textarea><br>
<button onclick="saveT()">Save</button>
`;
};

// ================= SAVE =================
window.saveQ=async function(){

await addDoc(collection(db,"questions"),{
topic:topic.value,
test:test.value,
question:question.value,
options:[o1.value,o2.value,o3.value,o4.value],
answer:answer.value,
explanation:explanation.value
});

alert("Saved");
loadData();
};

window.saveT=async function(){
await addDoc(collection(db,"theory"),{
topic:tTopic.value,
content:tContent.value
});
alert("Saved");
loadData();
};

// START
loadData();

</script>
</body>
</html>
