<!DOCTYPE html>
<html>
<body>

<script>

// ================= DATA =================
let topics = [
  {
    name: "Math",
    theory: "Math basics...",
    tests: [
      {
        name: "Math Test",
        questions: [
          {
            question: "2 + 2 = ?",
            options: ["1", "2", "3", "4"],
            answer: "4",
            explanation: "2 + 2 = 4"
          },
          {
            question: "5 × 2 = ?",
            options: ["10", "5", "2", "20"],
            answer: "10",
            explanation: "5 × 2 = 10"
          }
        ]
      }
    ]
  }
];

// ================= VARIABLES =================
let questions = [];
let currentIndex = 0;
let userAnswers = [];
let marked = [];
let visited = [];
let score = 0;
let timeLeft = 60;
let timerInterval;

// ================= TOPIC UI =================
function showTopics() {
  let html = "<h2>Select Topic</h2>";
  topics.forEach((t, i) => {
    html += `<button onclick="openTopic(${i})">${t.name}</button><br><br>`;
  });
  document.body.innerHTML = html;
}

function openTopic(i) {
  let t = topics[i];
  let html = `<h2>${t.name}</h2>
  <button onclick="showTheory(${i})">View Theory</button><h3>Tests:</h3>`;

  t.tests.forEach((test, j) => {
    html += `<button onclick="startTest(${i},${j})">${test.name}</button><br><br>`;
  });

  html += `<button onclick="showTopics()">Back</button>`;
  document.body.innerHTML = html;
}

function showTheory(i) {
  document.body.innerHTML = `
  <h2>${topics[i].name} Theory</h2>
  <p>${topics[i].theory}</p>
  <button onclick="openTopic(${i})">Back</button>`;
}

// ================= TEST =================
function startTest(ti, ti2) {
  questions = topics[ti].tests[ti2].questions;

  currentIndex = 0;
  userAnswers = Array(questions.length).fill(null);
  marked = Array(questions.length).fill(false);
  visited = Array(questions.length).fill(false);
  score = 0;
  timeLeft = 60;

  document.body.innerHTML = `
    <h3>Time: <span id="timer">60</span>s</h3>
    <div id="palette"></div>
    <h2 id="question"></h2>
    <div id="options"></div><br>
    <button onclick="markReview()">Mark for Review</button>
    <button onclick="prevQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="submitTest()">Submit</button>
  `;

  loadQuestion();
  startTimer();
}

// ================= QUESTION =================
function loadQuestion() {
  visited[currentIndex] = true;

  let q = questions[currentIndex];
  document.getElementById("question").innerText = q.question;

  let html = "";
  q.options.forEach(opt => {
    let selected = userAnswers[currentIndex] === opt ? "lightgreen" : "";
    html += `<button style="background:${selected}" onclick="selectAnswer('${opt}')">${opt}</button><br>`;
  });

  document.getElementById("options").innerHTML = html;
  loadPalette();
}

function selectAnswer(opt) {
  userAnswers[currentIndex] = opt;
  loadQuestion();
}

// ================= NAVIGATION =================
function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    loadQuestion();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

function goToQuestion(i) {
  currentIndex = i;
  loadQuestion();
}

// ================= REVIEW =================
function markReview() {
  marked[currentIndex] = !marked[currentIndex];
  loadPalette();
}

// ================= PALETTE =================
function loadPalette() {
  let html = "<h3>Questions:</h3>";

  questions.forEach((q, i) => {
    let color = "lightgray";

    if (!visited[i]) color = "lightgray";
    else if (marked[i]) color = "yellow";
    else if (userAnswers[i]) color = "lightgreen";
    else color = "red";

    html += `<button style="background:${color};margin:2px" onclick="goToQuestion(${i})">${i+1}</button>`;
  });

  document.getElementById("palette").innerHTML = html;
}

// ================= RESULT =================
function submitTest() {
  clearInterval(timerInterval);

  score = 0;
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  let html = `<h2>Score: ${score}/${questions.length}</h2>`;

  questions.forEach((q, i) => {
    html += `
    <p><b>Q${i+1}: ${q.question}</b></p>
    <p>Your: ${userAnswers[i]}</p>
    <p>Correct: ${q.answer}</p>
    <p>Explanation: ${q.explanation}</p>
    <hr>`;
  });

  html += `<button onclick="showTopics()">Home</button>`;
  document.body.innerHTML = html;
}

// ================= TIMER =================
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time up!");
      submitTest();
    }
  }, 1000);
}

// ================= START =================
showTopics();

</script>

</body>
</html>
