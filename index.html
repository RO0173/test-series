<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f5f6fa;margin:0;}
#app{padding:15px;}
button{padding:10px;margin:5px;border:none;background:#0984e3;color:white;border-radius:6px;cursor:pointer;}
.option{display:block;width:100%;padding:10px;margin:5px 0;background:#dfe6e9;border:none;}
.option.selected{background:#0984e3;color:white;}
</style>
</head>

<body>

<div id="app">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 PUT YOUR REAL FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const appDiv = document.getElementById("app");

// ================= DATA =================
let questions = [];
let current = 0;
let answers = [];

// ================= LOAD QUESTIONS =================
async function loadQuestions(){
  let snap = await getDocs(collection(db,"questions"));

  questions = [];
  snap.forEach(d=>{
    questions.push(d.data());
  });

  startTest();
}

// ================= START TEST =================
function startTest(){

  if(questions.length === 0){
    appDiv.innerHTML = "<h2>No Questions Found</h2>";
    return;
  }

  answers = Array(questions.length).fill(null);
  current = 0;
  renderQ();
}

// ================= RENDER QUESTION =================
function renderQ(){

  let q = questions[current];

  let html = `
    <h2>${q.question}</h2>
  `;

  q.options.forEach(opt=>{
    let sel = answers[current] === opt ? "selected" : "";
    html += `<button class="option ${sel}" onclick="selectAns('${opt}')">${opt}</button>`;
  });

  html += `
    <br>
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
    <button onclick="submitTest()">Submit</button>
  `;

  appDiv.innerHTML = html;
}

// ================= SELECT ANSWER =================
window.selectAns = function(opt){
  answers[current] = opt;
  renderQ();
};

// ================= NAVIGATION =================
window.next = function(){
  if(current < questions.length - 1){
    current++;
    renderQ();
  }
};

window.prev = function(){
  if(current > 0){
    current--;
    renderQ();
  }
};

// ================= SUBMIT =================
window.submitTest = function(){

  let score = 0;

  questions.forEach((q,i)=>{
    if(q.answer === answers[i]) score++;
  });

  appDiv.innerHTML = `
    <h2>Score: ${score}/${questions.length}</h2>
    <button onclick="loadQuestions()">Restart</button>
  `;
};

// ================= ADMIN =================
window.showAdmin = function(){

  appDiv.innerHTML = `
    <h2>Admin Panel</h2>

    <input id="topic" placeholder="Topic"><br>
    <input id="test" placeholder="Test"><br>
    <input id="question" placeholder="Question"><br>

    <input id="o1" placeholder="Option 1"><br>
    <input id="o2" placeholder="Option 2"><br>
    <input id="o3" placeholder="Option 3"><br>
    <input id="o4" placeholder="Option 4"><br>

    <input id="answer" placeholder="Correct Answer"><br><br>

    <button onclick="saveQ()">Save Question</button>
  `;
};

// ================= SAVE QUESTION =================
window.saveQ = async function(){

  await addDoc(collection(db,"questions"),{
    topic:topic.value,
    test:test.value,
    question:question.value,
    options:[o1.value,o2.value,o3.value,o4.value],
    answer:answer.value
  });

  alert("Question Added!");
};

// AUTO START
loadQuestions();

</script>

</body>
</html>
