<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
#header{background:#1e272e;color:white;padding:15px;font-size:18px;}
#app{padding:15px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{padding:10px;margin:5px;border:none;border-radius:6px;background:#0984e3;color:white;cursor:pointer;}
.option-btn{display:block;width:100%;padding:10px;margin:5px 0;border:none;background:#dfe6e9;cursor:pointer;}
.palette-btn{width:35px;height:35px;margin:3px;border:none;border-radius:5px;}
img{max-width:100%;}
</style>

</head>

<body>

<div id="header">📘 Coaching Platform</div>
<div id="app">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, getDocs, addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
authDomain: "ro-test-series.firebaseapp.com",
projectId: "ro-test-series",
storageBucket: "YOUR_PROJECT.appspot.com"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);

const appDiv = document.getElementById("app");

// ================= GLOBAL =================
let topics=[];
let questions=[];
let currentIndex=0;
let userAnswers=[];
let timeLeft=300;
let timer;

// ================= LOAD DATA =================
async function loadData(){

try{

let qSnap=await getDocs(collection(db,"questions"));
let tSnap=await getDocs(collection(db,"theory"));

let map={};

qSnap.forEach(d=>{
let q=d.data();

if(!map[q.topic]) map[q.topic]={name:q.topic,tests:{},theory:""};

if(!map[q.topic].tests[q.test]){
map[q.topic].tests[q.test]={name:q.test,questions:[]};
}

map[q.topic].tests[q.test].questions.push(q);
});

tSnap.forEach(d=>{
let t=d.data();

if(!map[t.topic]) map[t.topic]={name:t.topic,tests:{},theory:""};

map[t.topic].theory=t.content;
});

topics=Object.values(map).map(t=>({
name:t.name,
theory:t.theory,
tests:Object.values(t.tests)
}));

showTopics();

}catch(err){
console.error(err);
appDiv.innerHTML="<h3 style='color:red'>Firebase Error (Check Console)</h3>";
}

}

// ================= HOME =================
function showTopics(){

let html="<h2>Subjects</h2>";

topics.forEach((t,i)=>{
html+=`
<div class="card">
<h3>${t.name}</h3>
<button class="btn" onclick="openTopic(${i})">Open</button>
</div>`;
});

html+=`<button class="btn" onclick="openAdmin()">Admin</button>`;

appDiv.innerHTML=html;
}

window.showTopics=showTopics;

// ================= TOPIC =================
window.openTopic=function(i){

let t=topics[i];

let html=`<h2>${t.name}</h2>
<button class="btn" onclick="showTheory(${i})">Theory</button>`;

t.tests.forEach((test,j)=>{
html+=`
<div class="card">
${test.name}
<button class="btn" onclick="startTest(${i},${j})">Start</button>
</div>`;
});

appDiv.innerHTML=html;
};

// ================= THEORY =================
window.showTheory=function(i){
let t=topics[i];

appDiv.innerHTML=`
<h2>${t.name}</h2>
<div class="card">${t.theory || "No Theory Added"}</div>
<button class="btn" onclick="showTopics()">Back</button>`;
};

// ================= TEST =================
window.startTest=function(i,j){

questions=topics[i].tests[j].questions;

currentIndex=0;
userAnswers=Array(questions.length).fill(null);
timeLeft=300;

appDiv.innerHTML=`
<h3>Time: <span id="timer">300</span></h3>

<div class="card">
<h3 id="q"></h3>
<div id="opt"></div>
</div>

<button class="btn" onclick="prev()">Prev</button>
<button class="btn" onclick="next()">Next</button>
<button class="btn" onclick="submit()">Submit</button>
`;

loadQ();
startTimer();
};

// ================= QUESTION =================
function loadQ(){

let q=questions[currentIndex];

document.getElementById("q").innerText=q.question;

let html="";

q.options.forEach(opt=>{
let sel=userAnswers[currentIndex]===opt?"background:#0984e3;color:white":"";

html+=`
<button class="option-btn" style="${sel}" onclick="selectAns('${opt}')">
${opt}
</button>`;
});

document.getElementById("opt").innerHTML=html;
}

window.selectAns=function(opt){
userAnswers[currentIndex]=opt;
loadQ();
};

window.next=function(){
if(currentIndex<questions.length-1){
currentIndex++;
loadQ();
}
};

window.prev=function(){
if(currentIndex>0){
currentIndex--;
loadQ();
}
};

// ================= RESULT =================
window.submit=function(){

clearInterval(timer);

let score=0;

questions.forEach((q,i)=>{
if(q.answer===userAnswers[i]) score++;
});

appDiv.innerHTML=`
<h2>Score: ${score}/${questions.length}</h2>
<button class="btn" onclick="showTopics()">Home</button>`;
};

// ================= TIMER =================
function startTimer(){
clearInterval(timer);

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timer);
submit();
}
},1000);
}

// ================= ADMIN =================
window.openAdmin=function(){

appDiv.innerHTML=`
<h2>Admin Panel</h2>

<input id="topic" placeholder="Topic"><br><br>
<input id="test" placeholder="Test"><br><br>
<input id="question" placeholder="Question"><br><br>

<input id="o1" placeholder="Option 1"><br>
<input id="o2" placeholder="Option 2"><br>
<input id="o3" placeholder="Option 3"><br>
<input id="o4" placeholder="Option 4"><br><br>

<input id="answer" placeholder="Correct Answer"><br><br>

<button class="btn" onclick="saveQ()">Save Question</button>

<hr>

<input id="tTopic" placeholder="Topic"><br><br>
<textarea id="tContent" placeholder="Theory"></textarea><br><br>

<button class="btn" onclick="saveT()">Save Theory</button>

<button class="btn" onclick="showTopics()">Back</button>
`;
};

// ================= SAVE =================
window.saveQ=async function(){

await addDoc(collection(db,"questions"),{
topic:topic.value,
test:test.value,
question:question.value,
options:[o1.value,o2.value,o3.value,o4.value],
answer:answer.value
});

alert("Saved");
loadData();
};

window.saveT=async function(){

await addDoc(collection(db,"theory"),{
topic:tTopic.value,
content:tContent.value
});

alert("Saved");
loadData();
};

// START
loadData();

</script>

</body>
</html>
