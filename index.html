<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
#header{background:#1e272e;color:white;padding:15px;}
#app{padding:15px;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{padding:10px;margin:5px;border:none;border-radius:6px;background:#0984e3;color:white;cursor:pointer;}
.option-btn{display:block;width:100%;padding:10px;margin:5px 0;border:none;background:#dfe6e9;cursor:pointer;}
.palette-btn{width:40px;height:40px;margin:3px;border:none;}
img{max-width:100%;margin-top:10px;}
input,textarea{width:100%;padding:8px;margin:5px 0;}
</style>
</head>

<body>
<div id="header">📘 Test Platform</div>
<div id="app">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, getDoc, addDoc, doc, deleteDoc, updateDoc }  
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkiFtI0-t4jDWIWhp5gtrFCHSe84CXCHk",
  authDomain: "ro-test-series.firebaseapp.com",
  projectId: "ro-test-series",
  storageBucket: "ro-test-series.appspot.com",
  messagingSenderId: "58879445454",
  appId: "1:58879445454:web:df7d825eab569e3e40c39f"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const auth = getAuth(appF);
const storage = getStorage(appF);

const appDiv = document.getElementById("app");

// ===== GLOBAL =====
let topics=[],questions=[];
let editTheoryId = null;
let editId = null;
let currentIndex=0,userAnswers=[];
let visited=[],marked=[];
let timeLeft=300,timerInterval;
let currentUser=null;

// ===== AUTH =====
onAuthStateChanged(auth,(user)=>{
  currentUser=user;
  loadData();
});

// ===== LOAD DATA (FIXED) =====
async function loadData(){

  try{

    let qSnap = await getDocs(collection(db,"questions"));
    let tSnap = await getDocs(collection(db,"theory"));

    let map = {};

    // ===== QUESTIONS =====
    qSnap.forEach(d=>{
      let q = d.data();
      q.id = d.id;

      if(!q.topic || !q.test) return; // safety

      if(!map[q.topic]){
        map[q.topic] = {name:q.topic,tests:{},theory:""};
      }

      if(!map[q.topic].tests[q.test]){
        map[q.topic].tests[q.test] = {name:q.test,questions:[]};
      }

      map[q.topic].tests[q.test].questions.push(q);
    });

    // ===== THEORY =====
    tSnap.forEach(d=>{
      let t = d.data();

      if(!t || !t.topic) return;

      if(!map[t.topic]){
        map[t.topic] = {name:t.topic,tests:{},theory:""};
      }

      let block = "";

      if(t.content){
        block += t.content;
      }

      if(t.image){
        block += `<br><img src="${t.image}" style="max-width:100%;">`;
      }

      if(block){
        map[t.topic].theory =
          map[t.topic].theory
          ? map[t.topic].theory + "<hr>" + block
          : block;
      }
    });

    // ✅ VERY IMPORTANT (you were missing this earlier)
    topics = Object.values(map).map(t=>({
      name: t.name,
      theory: t.theory,
      tests: Object.values(t.tests)
    }));

    showTopics();

  }catch(err){
    console.error("LOAD ERROR:", err);
    appDiv.innerHTML = "Error loading data";
  }
}

// ===== HOME =====
window.showTopics=function(){
  let html="<h2>Subjects</h2>";

  topics.forEach((t,i)=>{
    html+=`
    <div class="card">
      <h3>${t.name}</h3>
      <button class="btn" onclick="openTopic(${i})">Open</button>
    </div>`;
  });

  html+=`<button class="btn" onclick="openAdmin()">Admin</button>`;
  appDiv.innerHTML=html;
};

// ===== TOPIC =====
window.openTopic=function(i){
  let t=topics[i];

  let html=`<h2>${t.name}</h2>
  <button class="btn" onclick="showTheory(${i})">Theory</button>`;

  t.tests.forEach((test,j)=>{
    html+=`
    <div class="card">
      ${test.name}
      <button class="btn" onclick="startTest(${i},${j})">Start</button>
    </div>`;
  });

  html+=`<button class="btn" onclick="showTopics()">Back</button>`;
  appDiv.innerHTML=html;
};

// ===== THEORY =====
window.showTheory=function(i){
  let t=topics[i];

  appDiv.innerHTML=`
  <h2>${t.name}</h2>
  <div class="card">${t.theory||"No theory"}</div>
  <button class="btn" onclick="openTopic(${i})">Back</button>`;
};

// ===== TEST =====
window.startTest=function(i,j){
  questions = topics[i].tests[j].questions;

  currentIndex=0;
  userAnswers=Array(questions.length).fill(null);
  visited=Array(questions.length).fill(false);
  marked=Array(questions.length).fill(false);
  timeLeft=300;

  appDiv.innerHTML=`
  <h3>Time: <span id="timer">300</span>s</h3>

  <div style="display:flex">
    <div id="palette" style="width:30%"></div>

    <div style="width:70%">
      <h3 id="q"></h3>
      <div id="img"></div>
      <div id="opt"></div>

      <button onclick="markReview()">Mark</button>
      <button onclick="prev()">Prev</button>
      <button onclick="next()">Next</button>
      <button onclick="submitTest()">Submit</button>
    </div>
  </div>`;

  loadQ();
  startTimer();
};

// ===== QUESTION =====
function loadQ(){
  visited[currentIndex]=true;

  let q=questions[currentIndex];

  document.getElementById("q").innerText=q.question;
  document.getElementById("img").innerHTML = q.image ? `<img src="${q.image}">` : "";

  let html="";
  q.options.forEach(opt=>{
    let sel=userAnswers[currentIndex]===opt ? "background:#0984e3;color:white" : "";

    html+=`
    <button class="option-btn" style="${sel}" onclick="ans('${opt}')">${opt}</button>`;
  });

  document.getElementById("opt").innerHTML=html;

  loadPalette();
}

window.ans=function(opt){
  userAnswers[currentIndex]=opt;
  loadQ();
};

// ===== NAV =====
window.next=function(){ if(currentIndex<questions.length-1){currentIndex++;loadQ();} };
window.prev=function(){ if(currentIndex>0){currentIndex--;loadQ();} };

// ===== MARK =====
window.markReview=function(){
  marked[currentIndex]=!marked[currentIndex];
  loadPalette();
};

// ===== PALETTE =====
function loadPalette(){
  let html="";

  questions.forEach((q,i)=>{
    let color="#b2bec3";

    if(visited[i] && !userAnswers[i]) color="#ff7675";
    if(userAnswers[i]) color="#55efc4";
    if(marked[i]) color="#ffeaa7";

    html+=`
    <button class="palette-btn"
    style="background:${color}"
    onclick="go(${i})">${i+1}</button>`;
  });

  document.getElementById("palette").innerHTML=html;
}

window.go=function(i){
  currentIndex=i;
  loadQ();
};

// ===== TIMER =====
function startTimer(){
  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=timeLeft;

    if(timeLeft<=0){
      clearInterval(timerInterval);
      alert("Time up!");
      submitTest();
    }
  },1000);
}

// ===== RESULT =====
window.submitTest=function(){
  clearInterval(timerInterval);

  let score=0;

  questions.forEach((q,i)=>{
    if(userAnswers[i]===q.answer) score++;
  });

  let percent = Math.round((score/questions.length)*100);

  let html=`
  <h2>Score: ${score}/${questions.length}</h2>
  <h3>Percentage: ${percent}%</h3>
  `;

  questions.forEach((q,i)=>{

    let correct = userAnswers[i]===q.answer;

    html+=`
    <div class="card" style="border-left:5px solid ${correct ? 'green':'red'}">
      ${q.question}<br>
      ${q.image?`<img src="${q.image}">`:''}

      <br><b>Your:</b> 
      <span style="color:${correct?'green':'red'}">
        ${userAnswers[i] || "Not Answered"}
      </span>

      <br><b>Correct:</b> ${q.answer}

      <p>${q.explanation||""}</p>
    </div>`;
  });

  html+=`<button class="btn" onclick="showTopics()">Home</button>`;

  appDiv.innerHTML=html;
};

// ===== LOGIN =====
function showLogin(){
  appDiv.innerHTML=`
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>`;
}

window.login=function(){
  let e=document.getElementById("email").value;
  let p=document.getElementById("pass").value;

  signInWithEmailAndPassword(auth,e,p)
  .then(()=>openAdmin())
  .catch(err=>alert(err.message));
};

  // ===== LOAD ADMIN DATA =====
async function loadAdminData(){

  let qSnap = await getDocs(collection(db,"questions"));
  let tSnap = await getDocs(collection(db,"theory"));

  let qHTML="";
qSnap.forEach((d,i)=>{
  let q = d.data();

  qHTML+=`
  <div style="border-bottom:1px solid #ccc;padding:5px">
    <b>${i+1}. ${q.question}</b><br>
    Topic: ${q.topic} | Test: ${q.test}<br>

    <button onclick="editQuestionFull('${d.id}')">Edit</button>
    <button onclick="deleteQuestion('${d.id}')">Delete</button>
  </div>`;
});

  let tHTML="";
  tSnap.forEach((d,i)=>{
  let t = d.data();

  tHTML+=`
  <div style="border-bottom:1px solid #ccc;padding:5px">
    <b>${i+1}. ${t.topic}</b><br>
    ${t.content.substring(0,100)}...<br>

    ${t.image ? `<br><img src="${t.image}" width="100">` : ""}

    <button onclick="editTheoryFull('${d.id}')">Edit</button>
    <button onclick="deleteTheory('${d.id}')">Delete</button>
  </div>`;
});

  document.getElementById("qList").innerHTML = qHTML || "No questions";
  document.getElementById("tList").innerHTML = tHTML || "No theory";
};

// ===== ADMIN =====
window.openAdmin=function(){

  if(!currentUser){
    showLogin();
    return;
  }

  if(currentUser.email!=="hks.sn94@gmail.com"){
    alert("Access denied");
    return;
  }

  appDiv.innerHTML=`
  <h2>Admin Panel</h2>

  <div class="card">
    <h3>Add Question</h3>
    <input id="topic" placeholder="Topic">
    <input id="test" placeholder="Test">
    <input id="question" placeholder="Question">
    <input type="file" id="imageFile">
    <input id="opt1" placeholder="Opt1">
    <input id="opt2" placeholder="Opt2">
    <input id="opt3" placeholder="Opt3">
    <input id="opt4" placeholder="Opt4">
    <input id="answer" placeholder="Answer">
    <input id="explanation" placeholder="Explanation">
    <button onclick="saveQ()">Save Question</button>
  </div>

  <div class="card">
    <h3>Add Theory</h3>
   <input id="tTopic" placeholder="Topic">
<textarea id="tContent" placeholder="Theory"></textarea>
<input type="file" id="tImage">
    <button onclick="saveTheory()">Save Theory</button>
  </div>

  <div class="card">
    <h3>All Questions</h3>
    <div id="qList"></div>
  </div>

  <div class="card">
    <h3>All Theory</h3>
    <div id="tList"></div>
  </div>

  <button class="btn" onclick="showTopics()">Back</button>
  `;

  loadAdminData(); // 🔥 IMPORTANT
};

// ===== SAVE QUESTION =====
window.saveQ = async function(){

  let topicVal = document.getElementById("topic").value;
  let testVal = document.getElementById("test").value;
  let questionVal = document.getElementById("question").value;

  let opt1Val = document.getElementById("opt1").value;
  let opt2Val = document.getElementById("opt2").value;
  let opt3Val = document.getElementById("opt3").value;
  let opt4Val = document.getElementById("opt4").value;

  let answerVal = document.getElementById("answer").value;
  let explanationVal = document.getElementById("explanation").value;

  // 🔴 VALIDATION (add this!)
  if(!topicVal || !testVal || !questionVal){
    alert("Please fill all required fields");
    return;
  }

  let file = document.getElementById("imageFile").files[0];
  let img = "";

  if(file){
    let r = ref(storage,'img/'+Date.now()+file.name);
    await uploadBytes(r,file);
    img = await getDownloadURL(r);
  }

  let data = {
    topic: topicVal,
    test: testVal,
    question: questionVal,
    options: [opt1Val,opt2Val,opt3Val,opt4Val],
    answer: answerVal,
    explanation: explanationVal
  };

  // 🔥 KEEP OLD IMAGE DURING EDIT
  if(editId){
    let snap = await getDoc(doc(db,"questions",editId));
    let old = snap.data();

    if(old.image && !img){
      data.image = old.image;
    }
  }

  if(img){
    data.image = img;
  }

  if(editId){
    await updateDoc(doc(db,"questions",editId), data);
    alert("Updated!");
    editId = null;
  }else{
    await addDoc(collection(db,"questions"), data);
    alert("Saved!");
  }

  loadAdminData();
  loadData(); // 🔥 IMPORTANT
};

// ===== SAVE THEORY =====
window.saveTheory = async function(){

  let file = document.getElementById("tImage").files[0];
  let img = "";

  // upload image (same like question)
  if(file){
    let storageRef = ref(storage, 'theory/' + Date.now() + file.name);
    await uploadBytes(storageRef, file);
    img = await getDownloadURL(storageRef);
  }

  let data = {
    topic: document.getElementById("tTopic").value,
    content: document.getElementById("tContent").value
  };

  // add image only if selected
  if(img){
    data.image = img;
  }

  // EDIT MODE
  if(editTheoryId){
    await updateDoc(doc(db,"theory",editTheoryId), data);
    alert("Theory Updated!");
    editTheoryId = null;
  }
  else{
    await addDoc(collection(db,"theory"), data);
    alert("Theory Saved!");
  }

  loadAdminData();
};
// ===== DELETE QUESTION =====
window.deleteQuestion = async function(id){

  let confirmDelete = confirm("Delete this question?");

  if(!confirmDelete) return;

  await deleteDoc(doc(db, "questions", id));

  alert("Question deleted");

  loadAdminData();
};

// ===== DELETE THEORY =====
window.deleteTheory = async function(id){

  let confirmDelete = confirm("Delete this theory?");

  if(!confirmDelete) return;

  await deleteDoc(doc(db, "theory", id));

  alert("Theory deleted");

  loadAdminData();
};
  // ===== FULL EDIT THEORY =====
window.editTheoryFull = async function(id){

  let snap = await getDocs(collection(db,"theory"));
  let data = null;

  snap.forEach(d=>{
    if(d.id === id){
      data = d.data();
    }
  });

  if(!data){
    alert("Theory not found");
    return;
  }

  document.getElementById("tTopic").value = data.topic;
  document.getElementById("tContent").value = data.content;

  editTheoryId = id;

  window.scrollTo(0,0);
};
  // ===== FULL EDIT QUESTION =====
window.editQuestionFull = async function(id){

  let snap = await getDocs(collection(db,"questions"));
  let data = null;

  snap.forEach(d=>{
    if(d.id === id){
      data = d.data();
    }
  });

  if(!data){
    alert("Question not found");
    return;
  }

  // Fill form
  document.getElementById("topic").value = data.topic;
  document.getElementById("test").value = data.test;
  document.getElementById("question").value = data.question;

  document.getElementById("opt1").value = data.options[0];
  document.getElementById("opt2").value = data.options[1];
  document.getElementById("opt3").value = data.options[2];
  document.getElementById("opt4").value = data.options[3];

  document.getElementById("answer").value = data.answer;
  document.getElementById("explanation").value = data.explanation;

  editId = id; // 🔥 important

  window.scrollTo(0,0); // scroll to form
};
  // ===== EDIT QUESTION =====
window.editQuestion = async function(id, oldText){

  let updated = prompt("Edit Question:", oldText);

  if(updated === null || updated === "") return;

  await updateDoc(doc(db, "questions", id), {
    question: updated
  });

  alert("Question updated");

  loadAdminData();
};
  // ===== EDIT THEORY =====
window.editTheory = async function(id, oldText){

  let updated = prompt("Edit Theory:", oldText);

  if(updated === null || updated === "") return;

  await updateDoc(doc(db, "theory", id), {
    content: updated
  });

  alert("Theory updated");

  loadAdminData();
};
</script>
</body>
</html>
